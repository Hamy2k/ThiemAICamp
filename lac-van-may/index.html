<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ff6b9d" />
<title>Lắc Vận May 🍀</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    user-select: none;
    touch-action: manipulation;
  }
  body {
    background: linear-gradient(135deg, #ff6b9d, #feca57, #48dbfb, #1dd1a1);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
    transition: filter 0.3s;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  header {
    text-align: center;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    padding-top: 20px;
  }
  header h1 { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
  header p { font-size: 14px; opacity: 0.9; margin-top: 6px; }
  .quote-box {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 20px;
  }
  .quote {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 30px 24px;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    font-size: 22px;
    font-weight: 600;
    color: #2c2c54;
    line-height: 1.5;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s, opacity 0.3s;
  }
  .quote.shake {
    animation: popIn 0.5s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0.7) rotate(-5deg); opacity: 0; }
    60% { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .btn {
    background: white;
    color: #ff6b9d;
    border: none;
    border-radius: 999px;
    padding: 20px 50px;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn:active {
    transform: scale(0.92) translateY(4px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .hint { color: white; font-size: 13px; opacity: 0.85; text-align: center; padding-bottom: 20px; }
  .emoji-rain {
    position: fixed;
    top: -50px;
    font-size: 32px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 100;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  .streak {
    position: absolute;
    top: 12px;
    right: 16px;
    background: rgba(0,0,0,0.25);
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    backdrop-filter: blur(6px);
  }
</style>
</head>
<body>
  <div class="streak" id="streak">🎯 0 lần</div>
  <header>
    <h1>🍀 Lắc Vận May 🍀</h1>
    <p>Lắc máy hoặc chạm nút để xem vận hôm nay!</p>
  </header>

  <div class="quote-box">
    <div class="quote" id="quote">Chào mừng bạn! 🎉<br/>Hãy bắt đầu nào!</div>
  </div>

  <button class="btn" id="shakeBtn">
    <span>🎲</span><span>LẮC NGAY</span>
  </button>
  <p class="hint">💡 Mẹo: lắc điện thoại cũng được nhé!</p>

<script>
const fortunes = [
  "Hôm nay crush sẽ nhắn tin cho bạn đó! 💌",
  "Cẩn thận kẻo trúng số độc đắc! 💰",
  "Ăn gì hôm nay cũng ngon miệng 🍜",
  "Nay là ngày đẹp trời để... lười 😎",
  "Sếp đang nghĩ về bạn một cách tích cực 👔",
  "Mèo hàng xóm đang ghen tỵ với bạn 🐱",
  "Bạn là idol trong lòng mẹ đó! 👑",
  "Mai bạn sẽ no căng bụng một bữa 🍖",
  "Người bạn thích đang thả tim story bạn ❤️",
  "Hôm nay gặp ai cũng thấy dễ thương 🥰",
  "Điềm báo: sắp có deal ngon đợi bạn 🛍️",
  "Chúc bạn ngủ ngon mơ đẹp đêm nay 😴",
  "Bạn đẹp trai/xinh gái nhất hôm nay! ✨",
  "Có người đang âm thầm ngưỡng mộ bạn 💕",
  "Hôm nay làm gì cũng trôi chảy 🌊",
  "Sắp có tin vui từ xa bay tới 🕊️",
  "Ví tiền bạn sắp nhẹ bớt gánh nặng 💸",
  "Vận may gõ cửa, mở ra liền nha! 🚪",
  "Nay ai cà khịa cứ cười trừ là thắng 😌",
  "Trời sinh bạn ra là để thành công 🌟",
  "Cafe hôm nay ngon hơn mọi ngày ☕",
  "Bạn sẽ tìm được vật gì đó đã mất 🔍",
  "Chú chó/mèo nào đó sắp yêu bạn 🐶",
  "Có người đang muốn rủ bạn đi ăn 🍕",
  "Xì trét bay hết, vui vẻ vào 😄",
  "Vũ trụ đang ngầm cưng chiều bạn 🌌",
  "Tự tin lên, bạn làm được! 💪",
  "Cười nhiều vào, phúc khí đầy nhà 😁",
  "Deadline hôm nay tự giải quyết 🎈",
  "Ăn kem đi, bạn xứng đáng! 🍦"
];

const emojis = ["🎉","✨","🌟","💖","🍀","⭐","💫","🎊","🌈","🎁"];
const quote = document.getElementById('quote');
const btn = document.getElementById('shakeBtn');
const streakEl = document.getElementById('streak');
let lastIdx = -1;
let streak = parseInt(localStorage.getItem('streak') || '0');
streakEl.textContent = `🎯 ${streak} lần`;

function pickFortune() {
  let i;
  do { i = Math.floor(Math.random() * fortunes.length); } while (i === lastIdx);
  lastIdx = i;
  return fortunes[i];
}

function rainEmojis(count = 15) {
  for (let i = 0; i < count; i++) {
    const e = document.createElement('div');
    e.className = 'emoji-rain';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + 'vw';
    e.style.animationDuration = (2 + Math.random() * 2) + 's';
    e.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 5000);
  }
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function roll() {
  quote.classList.remove('shake');
  void quote.offsetWidth;
  quote.textContent = pickFortune();
  quote.classList.add('shake');
  rainEmojis();
  vibrate([50, 30, 100]);
  streak++;
  localStorage.setItem('streak', streak);
  streakEl.textContent = `🎯 ${streak} lần`;
}

btn.addEventListener('click', roll);

// Shake detection
let lastShake = 0;
let lastX = null, lastY = null, lastZ = null;
const SHAKE_THRESHOLD = 18;

function handleMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const { x, y, z } = acc;
  if (lastX !== null) {
    const delta = Math.abs(x - lastX) + Math.abs(y - lastY) + Math.abs(z - lastZ);
    if (delta > SHAKE_THRESHOLD && Date.now() - lastShake > 800) {
      lastShake = Date.now();
      roll();
    }
  }
  lastX = x; lastY = y; lastZ = z;
}

function enableMotion() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(r => {
      if (r === 'granted') window.addEventListener('devicemotion', handleMotion);
    }).catch(() => {});
  } else {
    window.addEventListener('devicemotion', handleMotion);
  }
}
enableMotion();

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
