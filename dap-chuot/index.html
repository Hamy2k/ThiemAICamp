<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2ecc71" />
<title>Đập Chuột Vàng 🐭</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(180deg, #87ceeb 0%, #98d8a1 40%, #5cb85c 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    color: #222;
  }
  body.shake { animation: screenShake 0.4s; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-8px,4px); }
    40% { transform: translate(8px,-4px); }
    60% { transform: translate(-6px,-2px); }
    80% { transform: translate(6px,3px); }
  }

  .hud {
    width: 100%;
    max-width: 460px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    color: #fff;
    border-radius: 16px;
    padding: 10px 16px;
    backdrop-filter: blur(6px);
    font-weight: 800;
    margin-top: 10px;
  }
  .hud div { text-align: center; line-height: 1.1; }
  .hud .label { font-size: 11px; opacity: 0.75; font-weight: 600; }
  .hud .val { font-size: 22px; }
  .combo { color: #ffd700; }

  .timer-bar {
    width: 100%;
    max-width: 460px;
    height: 8px;
    background: rgba(0,0,0,0.25);
    border-radius: 999px;
    margin-top: 10px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
    width: 100%;
    transition: width 0.1s linear;
  }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px 0;
    width: 100%;
    max-width: 460px;
    align-content: center;
  }
  .hole {
    aspect-ratio: 1;
    background: radial-gradient(ellipse at center 70%, #3e2723 0%, #5d4037 50%, #795548 80%);
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 12px 20px rgba(0,0,0,0.6), 0 4px 8px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .hole::after {
    content: '';
    position: absolute;
    inset: auto 0 -10% 0;
    height: 30%;
    background: radial-gradient(ellipse at center top, rgba(0,0,0,0.5), transparent);
  }
  .critter {
    position: absolute;
    left: 50%;
    bottom: -100%;
    transform: translateX(-50%);
    font-size: min(14vw, 64px);
    transition: bottom 0.15s ease-out;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
    pointer-events: none;
  }
  .hole.active .critter { bottom: 10%; }
  .hole.hit .critter {
    animation: smash 0.3s forwards;
  }
  @keyframes smash {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.3) rotate(-10deg); }
    100% { transform: translateX(-50%) scale(0) rotate(360deg); opacity: 0; }
  }

  .popup {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translateX(-50%);
    font-weight: 900;
    font-size: 24px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    animation: popUp 0.8s forwards;
    pointer-events: none;
    white-space: nowrap;
  }
  .popup.plus { color: #ffe93c; }
  .popup.minus { color: #ff4757; }
  @keyframes popUp {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    z-index: 50;
  }
  .overlay.hidden { display: none; }
  .panel {
    background: #fff;
    border-radius: 28px;
    padding: 30px 28px;
    max-width: 340px;
    width: 88%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: popIn 0.4s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .panel h1 { font-size: 30px; margin-bottom: 8px; color: #e74c3c; }
  .panel h2 { font-size: 22px; margin-bottom: 14px; color: #2c3e50; }
  .panel .big-score {
    font-size: 56px;
    font-weight: 900;
    color: #f39c12;
    margin: 10px 0;
    text-shadow: 0 3px 0 #e67e22;
  }
  .panel .hi { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
  .panel .new-record { color: #27ae60; font-weight: 800; font-size: 16px; }
  .panel p { margin-bottom: 16px; color: #555; line-height: 1.5; font-size: 15px; }
  .panel ul { text-align: left; margin: 14px 0; color: #444; font-size: 14px; line-height: 1.8; }
  .btn {
    background: linear-gradient(180deg, #f39c12, #e67e22);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #a0522d, 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 8px;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a0522d, 0 4px 10px rgba(0,0,0,0.3); }
  .muted { background: rgba(255,255,255,0.25); color: #fff; border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
  <div class="hud">
    <div>
      <div class="label">ĐIỂM</div>
      <div class="val" id="score">0</div>
    </div>
    <div>
      <div class="label">KỶ LỤC</div>
      <div class="val" id="high">0</div>
    </div>
    <div>
      <div class="label">COMBO</div>
      <div class="val combo" id="combo">x1</div>
    </div>
    <div>
      <button class="muted" id="soundBtn">🔊</button>
    </div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>

  <div class="grid" id="grid"></div>

  <div class="overlay" id="overlay">
    <div class="panel" id="panel">
      <h1>🐭 ĐẬP CHUỘT VÀNG 🐭</h1>
      <p>Chạm vào chuột để đập! Chuột vàng 🐹 thưởng to, tránh bom 💣 kẻo mất điểm.</p>
      <ul>
        <li>🐭 Chuột thường: <b>+10</b></li>
        <li>🐹 Chuột vàng: <b>+50</b></li>
        <li>💣 Bom: <b>-20</b> (đừng chạm!)</li>
        <li>🔥 Combo liên tiếp: nhân điểm x2, x3...</li>
      </ul>
      <button class="btn" id="startBtn">BẮT ĐẦU</button>
    </div>
  </div>

<script>
const HOLES = 9;
const ROUND_MS = 30000;
const grid = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const comboEl = document.getElementById('combo');
const timerFill = document.getElementById('timerFill');
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
const soundBtn = document.getElementById('soundBtn');

let score = 0, combo = 0, best = parseInt(localStorage.getItem('dapchuot_hi') || '0');
let running = false, endTime = 0, soundOn = true;
let spawnTimer = null, tickTimer = null;
let difficulty = 1;

highEl.textContent = best;

const holes = [];
for (let i = 0; i < HOLES; i++) {
  const h = document.createElement('div');
  h.className = 'hole';
  const c = document.createElement('div');
  c.className = 'critter';
  h.appendChild(c);
  h.addEventListener('pointerdown', () => hit(i));
  grid.appendChild(h);
  holes.push({ el: h, critter: c, type: null, timeout: null });
}

// Simple WebAudio beeps
let audioCtx = null;
function beep(freq, dur = 0.08, type = 'square', gain = 0.15) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = gain;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

function showPopup(hole, text, cls) {
  const p = document.createElement('div');
  p.className = 'popup ' + (cls || '');
  p.textContent = text;
  hole.el.appendChild(p);
  setTimeout(() => p.remove(), 800);
}

function spawn() {
  if (!running) return;
  const free = holes.map((h, i) => h.type ? -1 : i).filter(i => i >= 0);
  if (free.length) {
    const idx = free[Math.floor(Math.random() * free.length)];
    const r = Math.random();
    let type, emoji;
    if (r < 0.10) { type = 'gold'; emoji = '🐹'; }
    else if (r < 0.22) { type = 'bomb'; emoji = '💣'; }
    else { type = 'mouse'; emoji = '🐭'; }
    const hole = holes[idx];
    hole.type = type;
    hole.critter.textContent = emoji;
    hole.el.classList.add('active');
    hole.el.classList.remove('hit');
    const lifeTime = Math.max(550, 1300 - difficulty * 80);
    hole.timeout = setTimeout(() => {
      if (hole.type === 'gold' || hole.type === 'mouse') {
        combo = 0; updateCombo();
      }
      clearHole(idx);
    }, lifeTime);
  }
  const nextSpawn = Math.max(250, 700 - difficulty * 40) + Math.random() * 200;
  spawnTimer = setTimeout(spawn, nextSpawn);
}

function clearHole(i) {
  const h = holes[i];
  h.type = null;
  h.el.classList.remove('active');
  if (h.timeout) { clearTimeout(h.timeout); h.timeout = null; }
}

function hit(i) {
  if (!running) return;
  const h = holes[i];
  if (!h.type) return;
  const t = h.type;
  h.el.classList.add('hit');
  if (t === 'mouse') {
    combo++;
    const pts = 10 * Math.min(combo, 5);
    score += pts;
    showPopup(h, '+' + pts, 'plus');
    beep(660, 0.08);
    vibrate(20);
  } else if (t === 'gold') {
    combo++;
    const pts = 50 * Math.min(combo, 5);
    score += pts;
    showPopup(h, '+' + pts + ' ⭐', 'plus');
    beep(880, 0.12, 'sine', 0.2);
    beep(1320, 0.1, 'sine', 0.15);
    vibrate([30, 20, 40]);
  } else if (t === 'bomb') {
    combo = 0;
    score = Math.max(0, score - 20);
    showPopup(h, '-20 💥', 'minus');
    beep(120, 0.2, 'sawtooth', 0.25);
    vibrate([80, 40, 80]);
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 400);
  }
  updateScore();
  updateCombo();
  setTimeout(() => clearHole(i), 200);
}

function updateScore() { scoreEl.textContent = score; }
function updateCombo() {
  const mult = Math.min(combo, 5);
  comboEl.textContent = 'x' + Math.max(1, mult);
}

function tick() {
  if (!running) return;
  const left = endTime - Date.now();
  if (left <= 0) return endGame();
  timerFill.style.width = (left / ROUND_MS * 100) + '%';
  difficulty = 1 + Math.floor((ROUND_MS - left) / 5000);
  tickTimer = setTimeout(tick, 100);
}

function startGame() {
  score = 0; combo = 0; difficulty = 1;
  updateScore(); updateCombo();
  holes.forEach((_, i) => clearHole(i));
  running = true;
  endTime = Date.now() + ROUND_MS;
  overlay.classList.add('hidden');
  tick();
  spawn();
  beep(523, 0.08); setTimeout(() => beep(659, 0.08), 80); setTimeout(() => beep(784, 0.12), 160);
}

function endGame() {
  running = false;
  clearTimeout(spawnTimer);
  clearTimeout(tickTimer);
  holes.forEach((_, i) => clearHole(i));
  timerFill.style.width = '0%';
  beep(392, 0.15); setTimeout(() => beep(330, 0.25), 120);
  const isNew = score > best;
  if (isNew) { best = score; localStorage.setItem('dapchuot_hi', best); highEl.textContent = best; }
  panel.innerHTML = `
    <h2>${isNew ? '🏆 KỶ LỤC MỚI!' : 'Hết giờ! ⏰'}</h2>
    <div class="big-score">${score}</div>
    <div class="hi">Kỷ lục: ${best} điểm</div>
    ${isNew ? '<div class="new-record">✨ Bạn vừa phá kỷ lục! ✨</div>' : ''}
    <br/>
    <button class="btn" id="againBtn">CHƠI LẠI</button>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('againBtn').addEventListener('click', startGame);
}

document.getElementById('startBtn').addEventListener('click', startGame);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
