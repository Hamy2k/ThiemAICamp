# Railway deploy config for FastAPI backend.
# Nixpacks auto-detects Python from pyproject.toml.
# Migrations run in preDeployCommand (zero downtime if backwards-compatible).

[build]
builder = "NIXPACKS"
# Ensure deps + Python 3.11 resolution
buildCommand = "pip install --upgrade pip && pip install -e ."

[deploy]
# Alembic migration gate — fails deploy if migration fails, protecting DB.
preDeployCommand = "alembic upgrade head"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 30"
healthcheckPath = "/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

# Resource hints — Railway will pick plan defaults if omitted
# [deploy.resources]
# cpu = "shared"
# memoryMB = 512
